<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Register | ResumeFlow</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="auth.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<section class="auth-page">

<div class="auth-box">

<div class="logo">

<h2>

Resume<span>Flow</span>

</h2>

</div>

<h1>

Create Account

</h1>

<p>

Join ResumeFlow and start building your professional resume today.

</p>

<form>

<div class="input-box">

<i class="fa-solid fa-user"></i>

<input
type="text"
placeholder="Full Name"
required>

</div>

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
placeholder="Email Address"
required>

</div>

<div class="input-box">

<i class="fa-solid fa-phone"></i>

<input
type="tel"
placeholder="Phone Number"
required>

</div>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
placeholder="Create Password"
required>

</div>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
placeholder="Confirm Password"
required>

</div>

<div class="remember">

<label>

<input
type="checkbox"
required>

I agree to the Terms & Conditions

</label>

</div>

<button
type="submit"
class="login-btn">

Create Account

</button>

</form>

<div class="divider">

<span>

OR

</span>

</div>

<div class="social-login">

<button>

<i class="fa-brands fa-google"></i>

Continue with Google

</button>

<button>

<i class="fa-brands fa-github"></i>

Continue with GitHub

</button>

</div>

<p class="register">

Already have an account?

<a href="login.html">

Login

</a>

</p>

</div>

</section>

</body>

</html>
