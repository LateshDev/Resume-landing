<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login | ResumeFlow</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="auth.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<section class="auth-page">

<div class="auth-box">

<div class="logo">

<h2>

Resume<span>Flow</span>

</h2>

</div>

<h1>

Welcome Back

</h1>

<p>

Login to continue building your professional resume.

</p>

<form>

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
placeholder="Email Address"
required>

</div>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
placeholder="Password"
required>

</div>

<div class="remember">

<label>

<input
type="checkbox">

Remember Me

</label>

<a href="#">

Forgot Password?

</a>

</div>

<button
type="submit"
class="login-btn">

Login

</button>

</form>

<div class="divider">

<span>

OR

</span>

</div>

<div class="social-login">

<button>

<i class="fa-brands fa-google"></i>

Google

</button>

<button>

<i class="fa-brands fa-github"></i>

GitHub

</button>

</div>

<p class="register">

Don't have an account?

<a href="register.html">

Register

</a>

</p>

</div>

</section>

<script src="auth.js"></script>

</body>

</html>
  

</html>
